name: Bug report
description: Report a reproducible bug in Wevoa OS
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Wevoa OS.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise summary of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the exact steps needed to reproduce the issue
      placeholder: |
        1. Build with ...
        2. Boot with ...
        3. Open ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: VM, host OS, build path, and any other relevant details
      placeholder: VirtualBox 7.x on Windows 11, built with tools/build-image.ps1
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add logs, screenshots, or terminal output if helpful
